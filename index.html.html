<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>콘텐츠 연구회 — 인쇄용 포스터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,900;1,700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f0eb;
    --text: #1a1816;
    --accent: #E63312;
    --muted: #b0aaa0;
    --divider: #d8d4cc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #666;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .poster {
    width: 210mm;
    height: 297mm;
    background: var(--bg);
    color: var(--text);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
  }

  /* === Giant background letter === */
  .bg-letter {
    position: absolute;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 620px;
    line-height: 0.7;
    color: transparent;
    -webkit-text-stroke: 2px var(--divider);
    top: 60px;
    right: -60px;
    user-select: none;
    z-index: 0;
  }

  /* === Main area — big title, lots of breathing room === */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 52px 0;
    position: relative;
    z-index: 1;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 20px;
  }

  .title {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 900;
    font-size: 76px;
    line-height: 1.05;
    letter-spacing: -3px;
  }

  .title em {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--accent);
    font-size: 0.8em;
    display: block;
    margin-bottom: 2px;
  }

  .subtitle {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 14px;
  }

  .tagline {
    font-weight: 300;
    font-size: 16px;
    color: #777;
    margin-top: 32px;
    line-height: 1.7;
  }

  .tagline strong {
    color: var(--text);
    font-weight: 700;
  }

  /* === Bottom bar — QR + hint === */
  .bottom {
    position: relative;
    z-index: 1;
    padding: 40px 52px 48px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
  }

  .bottom-left {
    flex: 1;
  }

  .bottom-divider {
    width: 48px;
    height: 2px;
    background: var(--accent);
    margin-bottom: 16px;
  }

  .bottom-hint {
    font-size: 13px;
    color: #999;
    line-height: 1.6;
  }

  .bottom-hint strong {
    color: var(--text);
    font-weight: 700;
  }

  /* QR code area */
  .qr-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .qr-box {
    width: 100px;
    height: 100px;
    background: white;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
  }

  /* Placeholder QR pattern using CSS */
  .qr-placeholder {
    width: 80px;
    height: 80px;
    position: relative;
  }

  .qr-placeholder svg {
    width: 100%;
    height: 100%;
  }

  .qr-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  /* ===== PRINT ===== */
  @media print {
    @page {
      size: A4 portrait;
      margin: 0;
    }
    body {
      background: none;
      display: block;
      min-height: auto;
    }
    .poster {
      width: 210mm;
      height: 297mm;
      margin: 0;
    }
    .poster, .poster * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
  }
</style>
</head>
<body>

<div class="poster">
  <!-- Background decorative letter -->
  <div class="bg-letter">C</div>

  <!-- Main content -->
  <div class="main">
    <div class="badge">2026 신입부원 모집</div>
    <h1 class="title">
      <em>Create.</em>
      콘텐츠<br>연구회

    <p class="subtitle">Contents Research Club</p>
    <p class="tagline">
      <strong>포스터</strong>를 만들고, <strong>신문</strong>을 읽고, <strong>코드</strong>를 씁니다.<br>
      당신의 아이디어를 콘텐츠로 바꿔보세요.
    </p>
  </div>

  <!-- Bottom — QR code + hint -->
  <div class="bottom">

      <div class="bottom-divider"></div>
      <p class="bottom-hint">

    </div>
    <div class="qr-area">

            <rect x="32" y="56" width="5" height="5" fill="#1a1816"/>

            <rect x="72" y="72" width="5" height="5" fill="#1a1816"/>
            <rect x="36" y="72" width="5" height="5" fill="#1a1816"/>
          </svg>
        </div>
      </div>
      <span class="qr-label">Scan Me</span>
    </div>
  </div>
</div>

</body>
</html>
